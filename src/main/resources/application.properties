spring.application.name=Tienda
server.port=91

logging.pattern.dateformat=hh:mm
spring.main.banner-mode=off
spring.thymeleaf.cache=false
spring.messages.encoding=UTF-8

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tienda_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

firebase.enabled=${FIREBASE_ENABLED:false}
firebase.bucket_name=${FIREBASE_BUCKET:}
firebase.storage_path=${FIREBASE_STORAGE_PATH:tienda}
firebase.credentials_path=${FIREBASE_CREDENTIALS:}