spring.application.name=Tienda
server.port=${PORT:91}
logging.pattern.dateformat=hh:mm
spring.main.banner-mode=off
spring.thymeleaf.cache=false
spring.messages.encoding=UTF-8

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tienda_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

firebase.enabled=${FIREBASE_ENABLED:false}
firebase.bucket.name=${FIREBASE_BUCKET:}
firebase.storage.path=${FIREBASE_STORAGE_PATH:tienda}
firebase.credentials.path=${FIREBASE_CREDENTIALS:}
