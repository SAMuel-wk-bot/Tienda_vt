<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"><body>
<section th:fragment="agregar" class="mb-3">
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agregarProductoModal"><i class="fa-solid fa-plus"></i> Agregar producto</button>
<div class="modal fade" id="agregarProductoModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-lg"><div class="modal-content">
<form th:action="@{/producto/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
<div class="modal-header text-bg-primary"><h2 class="modal-title fs-5">Nuevo producto</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div>
<div class="modal-body"><div class="row g-3">
<div class="col-md-6"><label class="form-label">Categoría</label><select class="form-select" th:field="*{categoria.idCategoria}" required="required"><option value="">Seleccione</option><option th:each="c:${categorias}" th:value="${c.idCategoria}" th:text="${c.descripcion}"></option></select></div>
<div class="col-md-6"><label class="form-label">Descripción</label><input class="form-control" th:field="*{descripcion}" required="required"/></div>
<div class="col-12"><label class="form-label">Detalle</label><textarea class="form-control" th:field="*{detalle}" rows="3"></textarea></div>
<div class="col-md-4"><label class="form-label">Precio</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{precio}" required="required"/></div>
<div class="col-md-4"><label class="form-label">Existencias</label><input class="form-control" type="number" min="0" th:field="*{existencias}" required="required"/></div>
<div class="col-md-4 d-flex align-items-end"><div class="form-check mb-2"><input class="form-check-input" type="checkbox" th:field="*{activo}"/><label class="form-check-label">Activo</label></div></div>
<div class="col-12"><label class="form-label">Imagen</label><input class="form-control" type="file" name="imagenFile" accept="image/*" onchange="mostrarImagen(this)"/><img id="blah" class="img-fluid mt-2" alt="Vista previa"/></div>
</div></div><div class="modal-footer"><button class="btn btn-success" type="submit">Guardar</button><button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cerrar</button></div>
</form></div></div></div></section>

<section th:fragment="listado"><div class="row"><div class="col-md-10"><div class="card"><div class="card-header bg-dark text-white"><h2 class="h4 mb-0">Listado de productos</h2></div>
<div class="table-responsive" th:if="${productos != null and !productos.empty}"><table class="table table-striped table-hover mb-0"><thead><tr><th>ID</th><th>Descripción</th><th>Categoría</th><th>Precio</th><th>Existencias</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody><tr th:each="p:${productos}"><td th:text="${p.idProducto}"></td><td th:text="${p.descripcion}"></td><td th:text="${p.categoria.descripcion}"></td><td th:text="${#numbers.formatCurrency(p.precio)}"></td><td th:text="${p.existencias}"></td><td th:text="${p.activo ? 'Activo':'Inactivo'}"></td><td class="text-nowrap"><a class="btn btn-warning btn-sm" th:href="@{/producto/modificar/{id}(id=${p.idProducto})}">Modificar</a> <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#confirmModal" th:data-bs-id="${p.idProducto}" th:data-bs-descripcion="${p.descripcion}">Eliminar</button></td></tr></tbody></table></div>
<p class="text-center p-4 mb-0" th:if="${productos == null or productos.empty}">No hay productos registrados.</p></div></div><div class="col-md-2"><div class="card text-bg-success text-center"><div class="card-body"><h3 class="h5">Total</h3><p class="display-6 mb-0" th:text="${totalProductos}"></p></div></div></div></div></section>

<section th:fragment="editar"><form th:action="@{/producto/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data" class="card"><input type="hidden" th:field="*{idProducto}"/><input type="hidden" th:field="*{rutaImagen}"/>
<div class="card-header"><h2 class="h4 mb-0">Modificar producto</h2></div><div class="card-body"><div class="row g-3">
<div class="col-md-6"><label class="form-label">Categoría</label><select class="form-select" th:field="*{categoria.idCategoria}"><option th:each="c:${categorias}" th:value="${c.idCategoria}" th:text="${c.descripcion}"></option></select></div>
<div class="col-md-6"><label class="form-label">Descripción</label><input class="form-control" th:field="*{descripcion}" required="required"/></div><div class="col-12"><label class="form-label">Detalle</label><textarea class="form-control" th:field="*{detalle}" rows="3"></textarea></div>
<div class="col-md-4"><label class="form-label">Precio</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{precio}"/></div><div class="col-md-4"><label class="form-label">Existencias</label><input class="form-control" type="number" min="0" th:field="*{existencias}"/></div>
<div class="col-md-4 d-flex align-items-end"><div class="form-check mb-2"><input class="form-check-input" type="checkbox" th:field="*{activo}"/><label class="form-check-label">Activo</label></div></div><div class="col-12"><label class="form-label">Imagen</label><input class="form-control" type="file" name="imagenFile" accept="image/*" onchange="mostrarImagen(this)"/><img id="blah" class="img-fluid mt-2" th:src="${producto.rutaImagen}" alt="Vista previa" height="200"/></div>
</div></div><div class="card-footer d-flex gap-2"><button class="btn btn-success" type="submit">Guardar</button><a class="btn btn-secondary" th:href="@{/producto/listado}">Regresar</a></div></form></section>

<section th:fragment="confirmarEliminar"><div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><form th:action="@{/producto/eliminar}" method="post"><input type="hidden" name="idProducto" id="modalId"/><div class="modal-header text-bg-warning"><h2 class="modal-title fs-5">Confirmar eliminación</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div><div class="modal-body">¿Desea eliminar <strong id="modalDescripcion"></strong>?</div><div class="modal-footer"><button class="btn btn-danger" type="submit">Eliminar</button><button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cerrar</button></div></form></div></div></div></section>
</body></html>
