<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <body>

        <!-- Solamente ADMIN puede agregar productos -->

        <section th:fragment="agregar"
                 class="mb-3"
                 sec:authorize="hasRole('ADMIN')">

            <button class="btn btn-primary"
                    type="button"
                    data-bs-toggle="modal"
                    data-bs-target="#agregarProductoModal">

                <i class="fa-solid fa-plus"></i>
                Agregar producto

            </button>

            <div class="modal fade"
                 id="agregarProductoModal"
                 tabindex="-1"
                 aria-hidden="true">

                <div class="modal-dialog modal-lg">

                    <div class="modal-content">

                        <form th:action="@{/producto/guardar}"
                              th:object="${producto}"
                              method="post"
                              enctype="multipart/form-data">

                            <div class="modal-header text-bg-primary">

                                <h2 class="modal-title fs-5">

                                    Nuevo producto

                                </h2>

                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal"
                                        aria-label="Cerrar">
                                </button>

                            </div>

                            <div class="modal-body">

                                <div class="row g-3">

                                    <!-- Categoría -->

                                    <div class="col-md-6">

                                        <label for="categoriaNueva"
                                               class="form-label">

                                            Categoría

                                        </label>

                                        <select id="categoriaNueva"
                                                class="form-select"
                                                th:field="*{categoria.idCategoria}"
                                                required="required">

                                            <option value="">

                                                Seleccione una categoría

                                            </option>

                                            <option th:each="c : ${categorias}"
                                                    th:value="${c.idCategoria}"
                                                    th:text="${c.descripcion}">
                                            </option>

                                        </select>

                                    </div>


                                    <!-- Descripción -->

                                    <div class="col-md-6">

                                        <label for="descripcionNueva"
                                               class="form-label">

                                            Descripción

                                        </label>

                                        <input id="descripcionNueva"
                                               class="form-control"
                                               th:field="*{descripcion}"
                                               maxlength="100"
                                               required="required"/>

                                    </div>


                                    <!-- Detalle -->

                                    <div class="col-12">

                                        <label for="detalleNuevo"
                                               class="form-label">

                                            Detalle

                                        </label>

                                        <textarea id="detalleNuevo"
                                                  class="form-control"
                                                  th:field="*{detalle}"
                                                  rows="3">
                                        </textarea>

                                    </div>


                                    <!-- Precio -->

                                    <div class="col-md-4">

                                        <label for="precioNuevo"
                                               class="form-label">

                                            Precio

                                        </label>

                                        <div class="input-group">

                                            <span class="input-group-text">
                                                ₡
                                            </span>

                                            <input id="precioNuevo"
                                                   class="form-control"
                                                   type="number"
                                                   step="0.01"
                                                   min="0"
                                                   th:field="*{precio}"
                                                   required="required"/>

                                        </div>

                                    </div>


                                    <!-- Existencias -->

                                    <div class="col-md-4">

                                        <label for="existenciasNuevas"
                                               class="form-label">

                                            Existencias

                                        </label>

                                        <input id="existenciasNuevas"
                                               class="form-control"
                                               type="number"
                                               min="0"
                                               th:field="*{existencias}"
                                               required="required"/>

                                    </div>


                                    <!-- Estado -->

                                    <div class="col-md-4
                                         d-flex align-items-end">

                                        <div class="form-check mb-2">

                                            <input id="activoNuevo"
                                                   class="form-check-input"
                                                   type="checkbox"
                                                   th:field="*{activo}"/>

                                            <label for="activoNuevo"
                                                   class="form-check-label">

                                                Producto activo

                                            </label>

                                        </div>

                                    </div>


                                    <!-- Imagen -->

                                    <div class="col-12">

                                        <label for="imagenNueva"
                                               class="form-label">

                                            Imagen

                                        </label>

                                        <input id="imagenNueva"
                                               class="form-control"
                                               type="file"
                                               name="imagenFile"
                                               accept="image/*"
                                               onchange="mostrarImagen(this)"/>

                                        <img id="blah"
                                             class="img-fluid mt-3 rounded"
                                             alt="Vista previa"
                                             style="max-height: 250px;"/>

                                    </div>

                                </div>

                            </div>

                            <div class="modal-footer">

                                <button class="btn btn-success"
                                        type="submit">

                                    <i class="fa-solid
                                       fa-floppy-disk">
                                    </i>

                                    Guardar

                                </button>

                                <button class="btn btn-secondary"
                                        type="button"
                                        data-bs-dismiss="modal">

                                    Cerrar

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </section>


        <!-- Listado de productos -->

        <section th:fragment="listado">

            <div class="row g-4">

                <div class="col-md-10">

                    <div class="card shadow-sm">

                        <div class="card-header bg-dark text-white">

                            <h2 class="h4 mb-0">

                                <i class="fa-solid fa-boxes-stacked"></i>
                                Listado de productos

                            </h2>

                        </div>

                        <div class="table-responsive"
                             th:if="${productos != null
                             and !productos.empty}">

                            <table class="table table-striped
                                   table-hover align-middle mb-0">

                                <thead>

                                    <tr>

                                        <th>ID</th>
                                        <th>Descripción</th>
                                        <th>Categoría</th>
                                        <th>Precio</th>
                                        <th>Existencias</th>
                                        <th>Estado</th>

                                        <th sec:authorize="hasRole('ADMIN')">
                                            Acciones
                                        </th>

                                    </tr>

                                </thead>

                                <tbody>

                                    <tr th:each="p : ${productos}">

                                        <td th:text="${p.idProducto}">
                                        </td>

                                        <td>

                                            <div class="d-flex
                                                 align-items-center gap-2">

                                                <img th:if="${p.rutaImagen
                                                     != null
                                                     and !p.rutaImagen
                                                     .isEmpty()}"
                                                     th:src="${p.rutaImagen}"
                                                     th:alt="${p.descripcion}"
                                                     class="rounded"
                                                     width="55"
                                                     height="55"
                                                     style="object-fit: cover;"/>

                                                <span th:text="${p.descripcion}">
                                                </span>

                                            </div>

                                        </td>

                                        <td th:text="${p.categoria.descripcion}">
                                        </td>

                                        <td th:text="${'₡'
                                            + #numbers.formatDecimal(
                                            p.precio,
                                            1,
                                            'POINT',
                                            2,
                                            'COMMA')}">
                                        </td>

                                        <td th:text="${p.existencias}">
                                        </td>

                                        <td>

                                            <span class="badge"
                                                  th:classappend="${p.activo}
                                                  ? ' text-bg-success'
                                                  : ' text-bg-danger'"
                                                  th:text="${p.activo
                                                  ? 'Activo'
                                                  : 'Inactivo'}">
                                            </span>

                                        </td>

                                        <td class="text-nowrap"
                                            sec:authorize="hasRole('ADMIN')">

                                            <a class="btn
                                               btn-warning btn-sm"
                                               th:href="@{/producto/modificar/{id}
                                               (id=${p.idProducto})}">

                                                <i class="fa-solid
                                                   fa-pen-to-square">
                                                </i>

                                                Modificar

                                            </a>

                                            <button class="btn
                                                    btn-danger btn-sm"
                                                    type="button"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#confirmModal"
                                                    th:data-bs-id="${p.idProducto}"
                                                    th:data-bs-descripcion="${p.descripcion}">

                                                <i class="fa-solid fa-trash">
                                                </i>

                                                Eliminar

                                            </button>

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                        <div class="card-body text-center"
                             th:if="${productos == null
                             or productos.empty}">

                            No hay productos registrados.

                        </div>

                    </div>

                </div>


                <!-- Total de productos -->

                <div class="col-md-2">

                    <div class="card
                         text-bg-success text-center shadow-sm">

                        <div class="card-body">

                            <i class="fa-solid
                               fa-box fa-2x mb-2">
                            </i>

                            <h3 class="h5">
                                Total
                            </h3>

                            <p class="display-6 mb-0"
                               th:text="${totalProductos}">
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </section>


        <!-- Formulario para modificar producto -->

        <section th:fragment="editar"
                 sec:authorize="hasRole('ADMIN')">

            <form th:action="@{/producto/guardar}"
                  th:object="${producto}"
                  method="post"
                  enctype="multipart/form-data"
                  class="card shadow-sm">

                <input type="hidden"
                       th:field="*{idProducto}"/>

                <input type="hidden"
                       th:field="*{rutaImagen}"/>

                <div class="card-header bg-warning">

                    <h2 class="h4 mb-0">

                        <i class="fa-solid fa-pen-to-square"></i>
                        Modificar producto

                    </h2>

                </div>

                <div class="card-body">

                    <div class="row g-3">

                        <!-- Categoría -->

                        <div class="col-md-6">

                            <label for="categoriaEditar"
                                   class="form-label">

                                Categoría

                            </label>

                            <select id="categoriaEditar"
                                    class="form-select"
                                    th:field="*{categoria.idCategoria}"
                                    required="required">

                                <option th:each="c : ${categorias}"
                                        th:value="${c.idCategoria}"
                                        th:text="${c.descripcion}">
                                </option>

                            </select>

                        </div>


                        <!-- Descripción -->

                        <div class="col-md-6">

                            <label for="descripcionEditar"
                                   class="form-label">

                                Descripción

                            </label>

                            <input id="descripcionEditar"
                                   class="form-control"
                                   th:field="*{descripcion}"
                                   maxlength="100"
                                   required="required"/>

                        </div>


                        <!-- Detalle -->

                        <div class="col-12">

                            <label for="detalleEditar"
                                   class="form-label">

                                Detalle

                            </label>

                            <textarea id="detalleEditar"
                                      class="form-control"
                                      th:field="*{detalle}"
                                      rows="3">
                            </textarea>

                        </div>


                        <!-- Precio -->

                        <div class="col-md-4">

                            <label for="precioEditar"
                                   class="form-label">

                                Precio

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    ₡
                                </span>

                                <input id="precioEditar"
                                       class="form-control"
                                       type="number"
                                       step="0.01"
                                       min="0"
                                       th:field="*{precio}"
                                       required="required"/>

                            </div>

                        </div>


                        <!-- Existencias -->

                        <div class="col-md-4">

                            <label for="existenciasEditar"
                                   class="form-label">

                                Existencias

                            </label>

                            <input id="existenciasEditar"
                                   class="form-control"
                                   type="number"
                                   min="0"
                                   th:field="*{existencias}"
                                   required="required"/>

                        </div>


                        <!-- Estado -->

                        <div class="col-md-4
                             d-flex align-items-end">

                            <div class="form-check mb-2">

                                <input id="activoEditar"
                                       class="form-check-input"
                                       type="checkbox"
                                       th:field="*{activo}"/>

                                <label for="activoEditar"
                                       class="form-check-label">

                                    Producto activo

                                </label>

                            </div>

                        </div>


                        <!-- Imagen -->

                        <div class="col-12">

                            <label for="imagenEditar"
                                   class="form-label">

                                Imagen

                            </label>

                            <input id="imagenEditar"
                                   class="form-control"
                                   type="file"
                                   name="imagenFile"
                                   accept="image/*"
                                   onchange="mostrarImagen(this)"/>

                            <img id="blah"
                                 class="img-fluid mt-3 rounded"
                                 th:src="${producto.rutaImagen}"
                                 alt="Vista previa"
                                 style="max-height: 250px;"/>

                        </div>

                    </div>

                </div>

                <div class="card-footer d-flex gap-2">

                    <button class="btn btn-success"
                            type="submit">

                        <i class="fa-solid fa-floppy-disk"></i>
                        Guardar cambios

                    </button>

                    <a class="btn btn-secondary"
                       th:href="@{/producto/listado}">

                        <i class="fa-solid fa-arrow-left"></i>
                        Regresar

                    </a>

                </div>

            </form>

        </section>


        <!-- Confirmación de eliminación -->

        <section th:fragment="confirmarEliminar"
                 sec:authorize="hasRole('ADMIN')">

            <div class="modal fade"
                 id="confirmModal"
                 tabindex="-1"
                 aria-hidden="true">

                <div class="modal-dialog
                     modal-dialog-centered">

                    <div class="modal-content">

                        <form th:action="@{/producto/eliminar}"
                              method="post">

                            <input type="hidden"
                                   name="idProducto"
                                   id="modalId"/>

                            <div class="modal-header
                                 text-bg-warning">

                                <h2 class="modal-title fs-5">

                                    Confirmar eliminación

                                </h2>

                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal"
                                        aria-label="Cerrar">
                                </button>

                            </div>

                            <div class="modal-body">

                                <p class="mb-0">

                                    ¿Desea eliminar el producto

                                    <strong id="modalDescripcion">
                                    </strong>?

                                </p>

                            </div>

                            <div class="modal-footer">

                                <button class="btn btn-danger"
                                        type="submit">

                                    <i class="fa-solid fa-trash"></i>
                                    Eliminar

                                </button>

                                <button class="btn btn-secondary"
                                        type="button"
                                        data-bs-dismiss="modal">

                                    Cancelar

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </section>

    </body>

</html>
