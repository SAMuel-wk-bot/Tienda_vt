<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="agregar" class="mb-3">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#agregarCategoriaModal">
        <i class="fa-solid fa-plus"></i> Agregar categoría
    </button>
    <div class="modal fade" id="agregarCategoriaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post" enctype="multipart/form-data">
                    <div class="modal-header text-bg-primary"><h2 class="modal-title fs-5">Nueva categoría</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Descripción</label>
                            <input class="form-control" th:field="*{descripcion}" maxlength="30" required="required"/></div>
                        <div class="mb-3"><label class="form-label">Imagen</label>
                            <input class="form-control" type="file" name="imagenFile" accept="image/*" onchange="mostrarImagen(this)"/>
                            <img id="blah" class="img-fluid mt-2" alt="Vista previa"/></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{activo}"/>
                            <label class="form-check-label">Activa</label></div>
                    </div>
                    <div class="modal-footer"><button class="btn btn-success" type="submit">Guardar</button>
                        <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cerrar</button></div>
                </form>
            </div>
        </div>
    </div>
</section>

<section th:fragment="listado">
    <div class="row">
        <div class="col-md-9">
            <div class="card">
                <div class="card-header bg-dark text-white"><h2 class="h4 mb-0">Listado de categorías</h2></div>
                <div class="table-responsive" th:if="${categorias != null and !categorias.empty}">
                    <table class="table table-striped table-hover mb-0">
                        <thead><tr><th>ID</th><th>Descripción</th><th>Imagen</th><th>Estado</th><th>Acciones</th></tr></thead>
                        <tbody><tr th:each="c : ${categorias}">
                            <td th:text="${c.idCategoria}"></td><td th:text="${c.descripcion}"></td>
                            <td><img th:if="${c.rutaImagen}" th:src="${c.rutaImagen}" alt="Imagen" height="60"/></td>
                            <td th:text="${c.activo ? 'Activa' : 'Inactiva'}"></td>
                            <td class="text-nowrap">
                                <a class="btn btn-warning btn-sm" th:href="@{/categoria/modificar/{id}(id=${c.idCategoria})}">Modificar</a>
                                <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#confirmModal"
                                        th:data-bs-id="${c.idCategoria}" th:data-bs-descripcion="${c.descripcion}">Eliminar</button>
                            </td>
                        </tr></tbody>
                    </table>
                </div>
                <p class="text-center p-4 mb-0" th:if="${categorias == null or categorias.empty}">No hay categorías registradas.</p>
            </div>
        </div>
        <div class="col-md-3"><div class="card text-bg-success text-center"><div class="card-body">
            <h3 class="h5">Total</h3><p class="display-6 mb-0" th:text="${totalCategorias}"></p></div></div></div>
    </div>
</section>

<section th:fragment="editar">
    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post" enctype="multipart/form-data" class="card">
        <input type="hidden" th:field="*{idCategoria}"/><input type="hidden" th:field="*{rutaImagen}"/>
        <div class="card-header"><h2 class="h4 mb-0">Modificar categoría</h2></div>
        <div class="card-body">
            <div class="mb-3"><label class="form-label">Descripción</label><input class="form-control" th:field="*{descripcion}" required="required"/></div>
            <div class="mb-3"><label class="form-label">Imagen</label><input class="form-control" type="file" name="imagenFile" accept="image/*" onchange="mostrarImagen(this)"/>
                <img id="blah" class="img-fluid mt-2" th:src="${categoria.rutaImagen}" alt="Vista previa" height="200"/></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" th:field="*{activo}"/><label class="form-check-label">Activa</label></div>
        </div>
        <div class="card-footer d-flex gap-2"><button class="btn btn-success" type="submit">Guardar</button>
            <a class="btn btn-secondary" th:href="@{/categoria/listado}">Regresar</a></div>
    </form>
</section>

<section th:fragment="confirmarEliminar">
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
        <form th:action="@{/categoria/eliminar}" method="post"><input type="hidden" name="idCategoria" id="modalId"/>
            <div class="modal-header text-bg-warning"><h2 class="modal-title fs-5">Confirmar eliminación</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div>
            <div class="modal-body">¿Desea eliminar <strong id="modalDescripcion"></strong>?</div>
            <div class="modal-footer"><button class="btn btn-danger" type="submit">Eliminar</button>
                <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cerrar</button></div>
        </form>
    </div></div></div>
</section>
</body>
</html>
