<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body class="d-flex flex-column min-vh-100">
        <header th:replace="~{general/fragmentos :: header}"></header>
        <main class="container flex-grow-1 py-4">
            <div class="row">
                <div class="col-md-9">
                    <div class="card">
                        <div class="card-header bg-dark text-white"><h2 class="h4 mb-0">Listado de categorías</h2></div>
                        <div class="card-body p-0">
                            <div class="table-responsive" th:if="${categorias != null and !categorias.empty}">
                                <table class="table table-striped table-hover mb-0">
                                    <thead><tr><th>ID</th><th>Descripción</th><th>Imagen</th><th>Estado</th></tr></thead>
                                    <tbody>
                                        <tr th:each="categoria : ${categorias}">
                                            <td th:text="${categoria.idCategoria}"></td>
                                            <td th:text="${categoria.descripcion}"></td>
                                            <td><img th:if="${categoria.rutaImagen}" th:src="${categoria.rutaImagen}" alt="Imagen" height="60"/></td>
                                            <td th:text="${categoria.activo ? 'Activa' : 'Inactiva'}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <p class="text-center p-4 mb-0" th:if="${categorias == null or categorias.empty}">No hay categorías registradas.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-bg-success text-center">
                        <div class="card-body"><h3 class="h5">Total</h3><p class="display-6 mb-0" th:text="${totalCategorias}"></p></div>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
